name: Python tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install runtime dependencies
        run: python -m pip install -r requirements.txt

      - name: Install test dependencies
        run: python -m pip install -r requirements-dev.txt

      - name: Run py_compile
        run: >
          python -m py_compile
          src/metanalisys.py
          src/metanalisys_core.py
          src/metanalisysGUI.py
          tests/conftest.py
          tests/test_metanalisys_core.py

      - name: Run pytest
        run: python -m pytest tests
